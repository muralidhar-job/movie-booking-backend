version: '3.8'

services:

  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: movieapp
      POSTGRES_PASSWORD: movieapp123
      POSTGRES_DB: movieplatform
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movieapp"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports: ["2181:2181"]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Platform Services ───────────────────────────────────────
  eureka-server:
    build: ./eureka-server
    ports: ["8761:8761"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      retries: 5

  api-gateway:
    build: ./api-gateway
    ports: ["8080:8080"]
    depends_on: [eureka-server, redis]
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-mySecretKey123456789012345678901234567890}

  user-service:
    build: ./user-service
    ports: ["8081:8081"]
    depends_on: [postgres, eureka-server]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/movieplatform
      DB_USER: movieapp
      DB_PASS: movieapp123
      EUREKA_URI: http://eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-mySecretKey123456789012345678901234567890}

  movie-service:
    build: ./movie-service
    ports: ["8082:8082"]
    depends_on: [postgres, eureka-server]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/movieplatform
      DB_USER: movieapp
      DB_PASS: movieapp123
      EUREKA_URI: http://eureka-server:8761/eureka

  theatre-service:
    build: ./theatre-service
    ports: ["8085:8085"]
    depends_on: [postgres, eureka-server, kafka]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/movieplatform
      DB_USER: movieapp
      DB_PASS: movieapp123
      EUREKA_URI: http://eureka-server:8761/eureka
      KAFKA_SERVERS: kafka:29092

  booking-service:
    build: ./booking-service
    ports: ["8083:8083"]
    depends_on: [postgres, eureka-server, kafka, redis]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/movieplatform
      DB_USER: movieapp
      DB_PASS: movieapp123
      EUREKA_URI: http://eureka-server:8761/eureka
      KAFKA_SERVERS: kafka:29092
      REDIS_HOST: redis

  payment-service:
    build: ./payment-service
    ports: ["8084:8084"]
    depends_on: [postgres, eureka-server, kafka]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/movieplatform
      DB_USER: movieapp
      DB_PASS: movieapp123
      EUREKA_URI: http://eureka-server:8761/eureka
      KAFKA_SERVERS: kafka:29092
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}

  offer-service:
    build: ./offer-service
    ports: ["8086:8086"]
    depends_on: [postgres, eureka-server]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/movieplatform
      DB_USER: movieapp
      DB_PASS: movieapp123
      EUREKA_URI: http://eureka-server:8761/eureka

volumes:
  postgres_data:
